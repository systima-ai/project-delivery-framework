[workflow]
artifact_pattern = "07-quality/secure-sdlc-health-cards/{date}.md"
intents = ["create", "update", "validate", "dump-merge"]
preceded_by = ["pdf-create-charter"]

[workflow.sub_dimensions]
items = [
  "Threat Modelling",
  "SAST",
  "DAST and Pen Testing",
  "SCA / Dependency Scanning",
  "Secrets Management",
  "Security Training and Culture",
]
require_all_assessed = true

[workflow.output]
summary_table_required = true
narrative_per_subdimension_required = true
compliance_regime_coverage_section_required = true

[workflow.compliance_check]
posture = "lax"  # warning only; never auto-demotes overall RAG
source = "00-constitution/CHARTER.md"
section = "Compliance Regimes"
require_every_declared_regime_in_table = true
require_status_per_regime = ["OK", "WARNING", "—"]
require_warning_explanation_when_warning = true

[workflow.rag]
values = ["R", "A", "G"]
overall_rule = "worst_of_subdimensions"
allow_overall_override_with_justification = true
compliance_warnings_do_not_force_rag = true

[workflow.sources]
default_mode = "ask"
fallback_mode = "interview"
record_in_frontmatter = true

[workflow.cadence]
default_days = 28
overridable_per_engagement = true

[workflow.red_team]
default = "off"

[workflow.handoff]
on_red_subdimension = "pdf-update-raid"
on_compliance_warning = "pdf-update-raid"
on_red_overall = "pdf-write-stakeholder-update"  # legal-compliance archetype
on_high_impact_compliance_warning = "pdf-decide-escalation"
on_completion = "pdf-help"

[workflow.high_impact_regimes]
items = ["EU AI Act high-risk", "HIPAA", "PCI-DSS", "FedRAMP", "GDPR major"]
