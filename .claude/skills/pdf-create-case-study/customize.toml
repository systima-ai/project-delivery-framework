[workflow]
artifact = "10-closure/case-study.md"
intents = ["create", "update", "validate", "dump-merge"]
preceded_by = ["pdf-run-retrospective"]
recommended_preceded_by = ["pdf-closure-checklist"]

[workflow.variants]
internal = true
public = true
single_file = true
require_both_sections_present = true  # public may be empty if consent denied; section still exists

[workflow.client_consent]
allowed_statuses = ["agreed", "pending", "no"]
require_agreed_before_publishing = true

[workflow.public_variant]
forbid_client_name_without_consent = true
forbid_individual_names = true
forbid_specific_financials_without_clearance = true
require_what_is_notable_hook = true

[workflow.red_team]
internal_default = "off"
public_default = "on"
required_before_publication = true
inline_simulation_until_skill_exists = false
dispatch_to = "pdf-red-team"
checks = [
  "Would client recognise themselves uncomfortably?",
  "Is the approach section honest?",
  "Are results overstated or attribution-unclear?",
  "Is there a 'call me about this' hook?",
  "Would client sponsor be happy to be quoted endorsing this?",
]

[workflow.handoff]
on_consent_pending = "pdf-decision-log"
on_public_published = "pdf-write-stakeholder-update"
on_completion = "pdf-help"
